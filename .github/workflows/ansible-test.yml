name: ansible-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanity-and-unit:
    runs-on: ubuntu-latest
    env:
      COLLECTION_NAMESPACE: granzer04
      COLLECTION_NAME: gpu_facts
      COLLECTION_ROOT: ${{ runner.temp }}/ansible_collections
      COLLECTION_PATH: ${{ runner.temp }}/ansible_collections/granzer04/gpu_facts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare collection layout for ansible-test
        run: |
          mkdir -p "${COLLECTION_ROOT}/${COLLECTION_NAMESPACE}"
          rm -rf "${COLLECTION_PATH}"
          mkdir -p "${COLLECTION_PATH}"
          tar -C "${GITHUB_WORKSPACE}" -cf - . | tar -C "${COLLECTION_PATH}" -xf -
          test -d "${COLLECTION_PATH}"

      - name: Sanity tests
        run: |
          cd "${COLLECTION_PATH}"
          ansible-test sanity plugins/modules/gpu_facts.py --test compile --test import --test ansible-doc -v

      - name: Unit tests
        run: |
          cd "${COLLECTION_PATH}"
          PYTHONPATH="$PWD" pytest tests/unit -v
